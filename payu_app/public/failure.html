<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        /* Line 1: Highlighting the failure message */
        h1 {
            color: #e74c3c; /* A clear, modern warning red */
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        /* Line 2: The descriptive paragraph */
        p {
            color: #7f8c8d; /* A soft, modern gray */
            font-size: 1.1rem;
            font-weight: 400;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Payment Failed</h1>
        <p>Something went wrong with your transaction. Please try again or use a different method.</p>
    </div>

</body>
</html>
