<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FocusFit – Profile</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dashboard-body">

  <nav class="navbar">
    <div class="brand">🌸 FocusFit</div>
    <div class="nav-right">
      <a href="/dashboard" class="logout-btn">Dashboard</a>
      <a href="/logout" class="logout-btn">Log out</a>
    </div>
  </nav>

  <div class="main-content">
    <h1 class="page-title">Your <span>Profile</span></h1>

    <div class="profile-card">
      <h2>{{ stats.name }}</h2>
      <p>{{ stats.email }}</p>

      <div class="profile-grid">
        <div class="profile-stat">
          <strong>🔥 {{ streak }}</strong>
          <span>Day Streak</span>
        </div>

        <div class="profile-stat">
          <strong>{{ stats.total_screen }}</strong>
          <span>Total Screen Minutes</span>
        </div>

        <div class="profile-stat">
          <strong>{{ stats.completed_tasks }}</strong>
          <span>Tasks Completed</span>
        </div>

        <div class="profile-stat">
          <strong>{{ stats.total_tasks }}</strong>
          <span>Total Tasks</span>
        </div>

        <div class="profile-stat">
          <strong>{{ stats.completed_fitness }}</strong>
          <span>Fitness Completed</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
